<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDDY TECH</title>
  <meta name="description" content="EDDY TECH — Professional digital solutions by Eddy. Website development, video editing, promo videos, and event media.">
  <meta name="theme-color" content="#08080d">

  <!-- Favicon: dynamically updated from Supabase profile_image setting -->
  <link rel="icon" type="image/png" sizes="32x32" id="favicon32" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2300e68a'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='bold' font-size='18' fill='%2308080d'>E</text></svg>">
  <link rel="icon" type="image/png" sizes="16x16" id="favicon16" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='4' fill='%2300e68a'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='bold' font-size='10' fill='%2308080d'>E</text></svg>">
  <link rel="apple-touch-icon" sizes="180x180" id="appleIcon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%2300e68a'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='bold' font-size='100' fill='%2308080d'>E</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    /* ══════════════════════════════════════════════════════════════
       CSS CUSTOM PROPERTIES
       ══════════════════════════════════════════════════════════════ */
    :root {
      --bg: #08080d;
      --bg-elevated: #0c0c14;
      --bg-card: #0f0f17;
      --bg-card-hover: #131320;
      --bg-input: rgba(255, 255, 255, 0.04);
      --bg-input-focus: rgba(255, 255, 255, 0.06);
      --bg-alt: #0a0a11;
      --fg: #e8e8f0;
      --fg-secondary: #c0c0d0;
      --fg-muted: #7a7a96;
      --fg-dim: #55556a;
      --accent: #00e68a;
      --accent-rgb: 0, 230, 138;
      --accent-dim: rgba(0, 230, 138, 0.10);
      --accent-soft: rgba(0, 230, 138, 0.18);
      --accent-glow: rgba(0, 230, 138, 0.25);
      --gold: #ffb800;
      --gold-rgb: 255, 184, 0;
      --gold-dim: rgba(255, 184, 0, 0.12);
      --danger: #ff4466;
      --danger-rgb: 255, 68, 102;
      --danger-dim: rgba(255, 68, 102, 0.12);
      --border: #1a1a2e;
      --border-light: #222240;
      --border-accent: rgba(0, 230, 138, 0.2);
      --radius-xs: 6px;
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 100px;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4), 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5), 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 4px 20px rgba(0, 230, 138, 0.2);
      --shadow-card-hover: 0 12px 48px rgba(0, 0, 0, 0.55), 0 4px 12px rgba(0, 230, 138, 0.08);
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'Space Grotesk', sans-serif;
      --header-h: 72px;
      --container-max: 1120px;
      --ease-fast: 0.2s ease;
      --ease: 0.3s ease;
      --ease-slow: 0.5s ease;
      --ease-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ══════════════════════════════════════════════════════════════
       RESET & BASE
       ══════════════════════════════════════════════════════════════ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: calc(var(--header-h) + 16px);
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.65;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a {
      color: inherit;
      text-decoration: none;
      transition: color var(--ease-fast);
    }

    img {
      max-width: 100%;
      display: block;
    }

    button {
      font-family: var(--font-body);
      cursor: pointer;
      border: none;
      background: none;
    }

    input, textarea, select {
      font-family: var(--font-body);
    }

    ::selection {
      background: rgba(var(--accent-rgb), 0.3);
      color: #fff;
    }

    ::-webkit-scrollbar {
      width: 7px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-light);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--fg-dim);
    }

    .container {
      width: 100%;
      max-width: var(--container-max);
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ══════════════════════════════════════════════════════════════
       SKELETON LOADING ANIMATIONS
       ══════════════════════════════════════════════════════════════ */
    .skeleton {
      background: linear-gradient(90deg, #12121e 25%, #1c1c30 37%, #12121e 63%);
      background-size: 400% 100%;
      animation: skelShimmer 1.8s ease-in-out infinite;
      border-radius: var(--radius-sm);
    }

    @keyframes skelShimmer {
      0% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .skel-line {
      height: 14px;
      margin-bottom: 10px;
      display: block;
      border-radius: 4px;
    }
    .skel-line.full { width: 100%; }
    .skel-line.w90 { width: 90%; }
    .skel-line.w75 { width: 75%; }
    .skel-line.w60 { width: 60%; }
    .skel-line.w45 { width: 45%; }
    .skel-line.w30 { width: 30%; }
    .skel-line.h18 { height: 18px; }
    .skel-line.h12 { height: 12px; }

    .skel-circle {
      border-radius: 50%;
      flex-shrink: 0;
    }

    .skel-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px 26px;
      box-shadow: var(--shadow);
    }

    /* ══════════════════════════════════════════════════════════════
       HEADER / NAVIGATION BAR
       ══════════════════════════════════════════════════════════════ */
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: var(--header-h);
      background: rgba(8, 8, 13, 0.72);
      backdrop-filter: blur(24px) saturate(1.3);
      -webkit-backdrop-filter: blur(24px) saturate(1.3);
      border-bottom: 1px solid var(--border);
      transition: background var(--ease), box-shadow var(--ease);
    }

    .site-header.scrolled {
      background: rgba(8, 8, 13, 0.94);
      box-shadow: 0 2px 24px rgba(0, 0, 0, 0.5);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
    }

    .logo-link {
      display: flex;
      align-items: center;
    }

    .logo {
      font-family: var(--font-heading);
      font-weight: 900;
      font-size: 1.35rem;
      letter-spacing: -0.5px;
      user-select: none;
    }

    .logo-green { color: var(--accent); }
    .logo-white { color: #ffffff; }

    /* Desktop navigation links */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-link {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--fg-muted);
      padding: 8px 18px;
      border-radius: var(--radius-full);
      transition: all var(--ease-fast);
      position: relative;
    }

    .nav-link:hover {
      color: var(--fg-secondary);
      background: rgba(255, 255, 255, 0.04);
    }

    .nav-link.active {
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Right side of nav */
    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Profile image circle in header */
    .profile-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--accent-dim);
      border: 2px solid rgba(var(--accent-rgb), 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-heading);
      font-weight: 900;
      font-size: 0.95rem;
      color: var(--accent);
      flex-shrink: 0;
      transition: border-color var(--ease-fast), transform var(--ease-fast), box-shadow var(--ease-fast);
    }

    .profile-circle:hover {
      border-color: rgba(var(--accent-rgb), 0.7);
      transform: scale(1.06);
      box-shadow: 0 0 16px rgba(var(--accent-rgb), 0.2);
    }

    .profile-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Hamburger menu button (mobile) */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      padding: 6px;
      cursor: pointer;
      background: none;
      border: none;
    }

    .hamburger-line {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--fg);
      border-radius: 2px;
      transition: all var(--ease);
      transform-origin: center;
    }

    .hamburger.open .hamburger-line:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }
    .hamburger.open .hamburger-line:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }
    .hamburger.open .hamburger-line:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* Mobile nav menu */
    @media (max-width: 768px) {
      .hamburger { display: flex; }

      .nav-links {
        position: fixed;
        top: var(--header-h);
        left: 0;
        right: 0;
        background: rgba(8, 8, 13, 0.96);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        flex-direction: column;
        align-items: stretch;
        padding: 8px 16px;
        gap: 4px;
        max-height: 0;
        overflow: hidden;
        transition: max-height var(--ease), padding var(--ease), border-color var(--ease);
        border-bottom: 1px solid transparent;
        z-index: 999;
      }

      .nav-links.open {
        max-height: 320px;
        padding: 16px;
        border-bottom-color: var(--border);
      }

      .nav-link {
        padding: 14px 18px;
        font-size: 0.95rem;
        border-radius: var(--radius-sm);
      }
    }

    /* ══════════════════════════════════════════════════════════════
       HERO SECTION
       ══════════════════════════════════════════════════════════════ */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: calc(var(--header-h) + 40px) 24px 80px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Grid pattern overlay */
    .hero-grid-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.022) 1px, transparent 1px);
      background-size: 64px 64px;
      z-index: 1;
    }

    /* Gradient overlay for when background image is set */
    .hero-gradient-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(8, 8, 13, 0.7) 0%,
        rgba(8, 8, 13, 0.5) 40%,
        rgba(8, 8, 13, 0.85) 100%
      );
      pointer-events: none;
      z-index: 1;
      display: none;
    }

    /* Animated glow behind hero text */
    .hero-glow {
      position: absolute;
      width: 650px;
      height: 650px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(var(--accent-rgb), 0.12) 0%,
        rgba(var(--accent-rgb), 0.04) 40%,
        transparent 70%
      );
      animation: heroGlowPulse 6s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes heroGlowPulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.6;
      }
      50% {
        transform: scale(1.18);
        opacity: 1;
      }
    }

    /* Secondary glow offset */
    .hero-glow-secondary {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(var(--accent-rgb), 0.06) 0%,
        transparent 65%
      );
      top: 20%;
      right: 10%;
      animation: heroGlowPulse 8s ease-in-out infinite reverse;
      pointer-events: none;
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 760px;
    }

    /* Tag pill above hero title */
    .hero-tag-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent-dim);
      border: 1px solid rgba(var(--accent-rgb), 0.18);
      padding: 9px 22px;
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 30px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulseDot 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulseDot {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(var(--accent-rgb), 0.5);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(var(--accent-rgb), 0);
      }
    }

    /* Hero heading */
    .hero-title {
      font-family: var(--font-heading);
      font-weight: 900;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      line-height: 1.08;
      margin-bottom: 26px;
      letter-spacing: -1.5px;
    }

    .hero-title .accent-text {
      color: var(--accent);
      position: relative;
    }

    .hero-title .accent-text::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      opacity: 0.4;
    }

    /* Hero paragraph text */
    .hero-paragraph {
      font-size: 1.05rem;
      color: var(--fg-muted);
      max-width: 580px;
      margin: 0 auto 40px;
      line-height: 1.75;
    }

    /* Primary CTA button */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #08080d;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.95rem;
      padding: 15px 36px;
      border-radius: var(--radius-full);
      border: none;
      cursor: pointer;
      box-shadow: var(--shadow-glow);
      transition: all var(--ease);
      letter-spacing: 0.2px;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(var(--accent-rgb), 0.35);
      background: #00cc7a;
    }

    .btn-primary:active {
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-primary .btn-icon {
      font-size: 0.85rem;
      transition: transform var(--ease);
    }

    .btn-primary:hover .btn-icon {
      transform: translateY(2px);
    }

    /* Button spinner */
    .btn-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2.5px solid rgba(8, 8, 13, 0.25);
      border-top-color: #08080d;
      border-radius: 50%;
      animation: btnSpin 0.6s linear infinite;
    }

    @keyframes btnSpin {
      to { transform: rotate(360deg); }
    }

    /* ══════════════════════════════════════════════════════════════
       SECTIONS (Generic)
       ══════════════════════════════════════════════════════════════ */
    .site-section {
      padding: 100px 0;
    }

    .site-section.alt-bg {
      background: var(--bg-alt);
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-label {
      display: inline-block;
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .section-title {
      font-family: var(--font-heading);
      font-weight: 900;
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      letter-spacing: -0.5px;
      line-height: 1.15;
    }

    /* ══════════════════════════════════════════════════════════════
       SERVICE CARDS
       ══════════════════════════════════════════════════════════════ */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
      gap: 22px;
    }

    .service-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 26px;
      box-shadow: var(--shadow);
      transition: all var(--ease);
      position: relative;
      overflow: hidden;
    }

    /* Green top line that animates in on hover */
    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), rgba(var(--accent-rgb), 0.5));
      transform: scaleX(0);
      transform-origin: left center;
      transition: transform var(--ease);
    }

    .service-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-card-hover);
      border-color: var(--border-accent);
      background: var(--bg-card-hover);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-card-icon {
      width: 54px;
      height: 54px;
      border-radius: var(--radius-sm);
      background: var(--accent-dim);
      border: 1px solid rgba(var(--accent-rgb), 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: var(--accent);
      margin-bottom: 22px;
      transition: all var(--ease);
    }

    .service-card:hover .service-card-icon {
      background: var(--accent-soft);
      border-color: rgba(var(--accent-rgb), 0.15);
      transform: scale(1.06);
    }

    .service-card-title {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 1.12rem;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .service-card-desc {
      font-size: 0.87rem;
      color: var(--fg-muted);
      line-height: 1.65;
    }

    /* ══════════════════════════════════════════════════════════════
       CONTACT CARDS
       ══════════════════════════════════════════════════════════════ */
    .contacts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 22px;
    }

    .contact-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 18px;
      transition: all var(--ease);
    }

    .contact-card:hover {
      border-color: var(--border-accent);
      transform: translateY(-4px);
      box-shadow: var(--shadow-card-hover);
      background: var(--bg-card-hover);
    }

    .contact-card-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      background: var(--accent-dim);
      border: 1px solid rgba(var(--accent-rgb), 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--accent);
      flex-shrink: 0;
      transition: all var(--ease);
    }

    .contact-card:hover .contact-card-icon {
      background: var(--accent-soft);
      transform: scale(1.05);
    }

    .contact-card-title {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 0.95rem;
      margin-bottom: 5px;
    }

    .contact-card-link {
      font-size: 0.88rem;
      color: var(--fg-muted);
      transition: color var(--ease-fast);
      word-break: break-all;
      line-height: 1.5;
    }

    .contact-card-link:hover {
      color: var(--accent);
    }

    /* Special email button style */
    .contact-card-link.email-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-weight: 600;
      padding: 6px 0;
      border-bottom: 1px dashed rgba(var(--accent-rgb), 0.3);
      transition: all var(--ease-fast);
    }

    .contact-card-link.email-link:hover {
      border-bottom-color: var(--accent);
      gap: 10px;
    }

    .contact-card-link.email-link .email-arrow {
      font-size: 0.75rem;
      transition: transform var(--ease-fast);
    }

    .contact-card-link.email-link:hover .email-arrow {

       ══════════════════════════════════════════════════════════════ */

      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--fg-muted);

      color: var(--accent);
      transition: opacity var(--ease-fast);
    }

    .site-footer a:hover {
      opacity: 0.8;
    }

    /* ══════════════════════════════════════════════════════════════
       TOAST NOTIFICATIONS
       ══════════════════════════════════════════════════════════════ */
    #toastContainer {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column-reverse;
      gap: 10px;
      pointer-events: none;
    }

    .toast-notification {
      pointer-events: auto;
      background: #181828;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 20px;
      min-width: 280px;
      max-width: 420px;
      box-shadow: 0 10px 36px rgba(0, 0, 0, 0.55);
      font-size: 0.86rem;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      animation: toastSlideIn 0.35s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
      line-height: 1.5;
    }

    .toast-notification.dismissing {
      animation: toastSlideOut 0.28s ease forwards;
    }

    .toast-notification.toast-success {
      border-left: 3px solid var(--accent);
    }

    .toast-notification.toast-error {
      border-left: 3px solid var(--danger);
    }

    .toast-notification .toast-icon {
      font-size: 1rem;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .toast-notification.toast-success .toast-icon {
      color: var(--accent);
    }

    .toast-notification.toast-error .toast-icon {
      color: var(--danger);
    }

    .toast-notification .toast-message {
      flex: 1;
    }

    @keyframes toastSlideIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes toastSlideOut {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      to {
        opacity: 0;
        transform: translateY(16px) scale(0.96);
      }
    }

    /* ══════════════════════════════════════════════════════════════
       CONNECTION STATUS INDICATOR
       ══════════════════════════════════════════════════════════════ */
    #connectionStatus {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 900;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(15, 15, 23, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      padding: 8px 16px;
      font-size: 0.7rem;
      color: var(--fg-muted);
      transition: all var(--ease);
    }

    .connection-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--fg-dim);
      flex-shrink: 0;
      transition: all var(--ease);
    }

    .connection-dot.online {
      background: var(--accent);
      box-shadow: 0 0 8px rgba(var(--accent-rgb), 0.6);
    }

    .connection-dot.offline {
      background: var(--danger);
      box-shadow: 0 0 8px rgba(var(--danger-rgb), 0.6);
      animation: connectionPulse 1.5s ease-in-out infinite;
    }

    @keyframes connectionPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ══════════════════════════════════════════════════════════════
       SCROLL REVEAL ANIMATIONS
       ══════════════════════════════════════════════════════════════ */
    .scroll-reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.7s ease, transform 0.7s ease;
      will-change: opacity, transform;
    }

    .scroll-reveal.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    .scroll-reveal.delay-1 { transition-delay: 0.08s; }
    .scroll-reveal.delay-2 { transition-delay: 0.16s; }
    .scroll-reveal.delay-3 { transition-delay: 0.24s; }
    .scroll-reveal.delay-4 { transition-delay: 0.32s; }

    /* ══════════════════════════════════════════════════════════════
       REDUCED MOTION
       ══════════════════════════════════════════════════════════════ */
    @media (prefers-reduced-motion: reduce) {
      .scroll-reveal {
        opacity: 1;
        transform: none;
        transition: none;
      }
      .hero-glow,
      .hero-glow-secondary {
        animation: none;
      }
      .pulse-dot {
        animation: none;
      }
      .skeleton {
        animation: none;
      }
      .connection-dot.offline {
        animation: none;
      }
      html {
        scroll-behavior: auto;
      }
    }

    /* ══════════════════════════════════════════════════════════════
       RESPONSIVE BREAKPOINTS
       ══════════════════════════════════════════════════════════════ */

    function escapeHtml(str) {

      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));

    function formatDate(dateStr) {

      var dateStrClean = dateStr.indexOf('T') > -1 ? dateStr : dateStr + 'T00:00:00';

      /* Extract the email address part */
      var emailPart = link.replace('mailto:', '').trim();
      /* Return the full mailto with default subject and body */
      return DEFAULT_EMAIL_MAILTO;
    }

    /**
     * Check if a link is a mailto: link
     * @param {string} link - URL string
     * @returns {boolean}
     */
    function isMailtoLink(link) {
      return link && link.indexOf('mailto:') === 0;
    }

    /* ══════════════════════════════════════════════════════════════
       SUPABASE FETCH HELPER
       Sends requests with proper headers, parses response,
       and throws descriptive errors on failure.
       ══════════════════════════════════════════════════════════════ */
    async function supabaseFetch(url, options) {
      options = options || {};
      /* Merge default headers with any custom headers */
      var mergedHeaders = {};
      for (var key in DEFAULT_HEADERS) {
        mergedHeaders[key] = DEFAULT_HEADERS[key];
      }
      if (options.headers) {
        for (var hk in options.headers) {
          mergedHeaders[hk] = options.headers[hk];
        }
      }

      var response = await fetch(url, {
        method: options.method || 'GET',
        headers: mergedHeaders,
        body: options.body || undefined
      });

      /* Handle non-OK responses */
      if (!response.ok) {
        var errorMessage;
        try {
          var errorData = await response.json();
          errorMessage = errorData.message || errorData.msg || errorData.error || JSON.stringify(errorData);
        } catch (parseErr) {
          errorMessage = response.statusText || ('HTTP Error ' + response.status);
        }
        throw new Error(errorMessage);
      }

      /* Parse JSON response, handle empty body for DELETE/PATCH */
      var responseText = await response.text();
      if (!responseText || responseText.trim() === '') {
        return [];
      }

      try {
        return JSON.parse(responseText);
      } catch (parseErr) {
        throw new Error('Invalid JSON response from server');
      }
    }

    /* ══════════════════════════════════════════════════════════════
       TOAST NOTIFICATION SYSTEM
       Shows slide-up notifications that auto-dismiss after 4s
       ══════════════════════════════════════════════════════════════ */
    function showToast(message, type) {
      type = type || 'success';
      var container = document.getElementById('toastContainer');
      var toast = document.createElement('div');
      toast.className = 'toast-notification toast-' + type;

      var iconClass;
      if (type === 'success') {
        iconClass = 'fa-check-circle';
      } else {
        iconClass = 'fa-exclamation-circle';
      }

      toast.innerHTML =
        '<i class="fas ' + iconClass + ' toast-icon"></i>' +
        '<span class="toast-message">' + escapeHtml(message) + '</span>';

      container.appendChild(toast);

      /* Auto-dismiss after 4 seconds */
      var dismissTimer = setTimeout(function() {
        dismissToast(toast);
      }, 4000);

      /* Store timer so we can clear it if manually dismissed */
      toast._dismissTimer = dismissTimer;
    }

    function dismissToast(toastElement) {
      if (!toastElement || toastElement._dismissed) return;
      toastElement._dismissed = true;
      clearTimeout(toastElement._dismissTimer);
      toastElement.classList.add('dismissing');
      setTimeout(function() {
        if (toastElement.parentNode) {
          toastElement.parentNode.removeChild(toastElement);
        }
      }, 300);
    }

       DATA RENDERERS — Contacts
       Includes special handling for mailto: links to show
       "send us an email" styled button instead of plain link
       ══════════════════════════════════════════════════════════════ */
    function renderContacts(contacts) {
      var grid = document.getElementById('contactsGrid');

      if (!contacts || contacts.length === 0) {
        grid.innerHTML = '<p style="color:var(--fg-muted);text-align:center;grid-column:1/-1;padding:40px 0;">No contact info available yet.</p>';

        var iconClass = escapeHtml(c.icon || 'fa-phone');
        var linkHref = '';
        var linkHTML = '';

        /* Check if this contact has a mailto: link */
        if (c.link && isMailtoLink(c.link)) {
          /* Enhance the mailto link with subject/body if needed */
          var fullMailto = enhanceMailtoLink(c.link);
          linkHref = fullMailto;
          linkHTML =
            '<a href="' + escapeHtml(fullMailto) + '" class="contact-card-link email-link">' +

              'Send us an email ' +

          linkHref = c.link;
          linkHTML =
            '<a href="' + escapeHtml(c.link) + '" target="_blank" rel="noopener noreferrer" class="contact-card-link">' +

    /* ══════════════════════════════════════════════════════════════
       PROFILE IMAGE SETTER
       Uses proper DOM element creation with addEventListener
       for error handling (fixes inline onerror quote bug)
       ══════════════════════════════════════════════════════════════ */
    function setProfileImage(imageUrl) {
      var circle = document.getElementById('profileCircle');

      if (imageUrl && imageUrl.trim()) {
        var img = document.createElement('img');
        img.alt = 'EDDY TECH Profile';
        img.src = imageUrl;

        /* Proper error handler — no inline onerror */
        img.addEventListener('error', function() {
          circle.innerHTML = '<span>E</span>';
        });

        /* On successful load, replace circle content with image */
        img.addEventListener('load', function() {
          circle.innerHTML = '';
          circle.appendChild(img);
        });

        circle.innerHTML = '';
        circle.appendChild(img);
      } else {
        /* No image set — show the letter E */
        circle.innerHTML = '<span>E</span>';
      }
    }

    /* ══════════════════════════════════════════════════════════════
       STAR RATING INTERACTION
       Handles hover preview and click-to-select for the 5 stars
       ══════════════════════════════════════════════════════════════ */
    var selectedStarRating = 0;
    var starRatingContainer = document.getElementById('starRating');
    var starElements = starRatingContainer.querySelectorAll('.star');

    function updateStarVisual(ratingValue) {
      for (var i = 0; i < starElements.length; i++) {
        var star = starElements[i];
        var starValue = parseInt(star.getAttribute('data-value'), 10);
        if (starValue <= ratingValue) {
          star.classList.add('lit');
        } else {
          star.classList.remove('lit');
        }
      }
    }

    /* Hover: preview the rating */
    for (var si = 0; si < starElements.length; si++) {
      (function(star) {
        star.addEventListener('mouseenter', function() {
          var val = parseInt(star.getAttribute('data-value'), 10);
          updateStarVisual(val);
        });

        /* Click: lock in the rating */
        star.addEventListener('click', function() {
          selectedStarRating = parseInt(star.getAttribute('data-value'), 10);
          updateStarVisual(selectedStarRating);
        });

        /* Keyboard support */
        star.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            selectedStarRating = parseInt(star.getAttribute('data-value'), 10);
            updateStarVisual(selectedStarRating);
          }
        });
      })(starElements[si]);
    }

    /* Mouse leave: revert to selected rating */
    starRatingContainer.addEventListener('mouseleave', function() {
      updateStarVisual(selectedStarRating);
    });

    /* ══════════════════════════════════════════════════════════════
       REVIEW SUBMISSION
       Validates inputs, shows spinner, POSTs to Supabase,
       then refreshes the review list from the database
       ══════════════════════════════════════════════════════════════ */
    var submitReviewBtn = document.getElementById('submitReviewBtn');
    var reviewNameInput = document.getElementById('reviewNameInput');
    var reviewTextInput = document.getElementById('reviewTextInput');

    submitReviewBtn.addEventListener('click', async function() {
      var nameValue = reviewNameInput.value.trim();
      var textValue = reviewTextInput.value.trim();

      /* Validation */
      if (!selectedStarRating) {
        showToast('Please select a star rating.', 'error');
        return;
      }
      if (!nameValue) {
        showToast('Please enter your name.', 'error');
        reviewNameInput.focus();
        return;
      }
      if (!textValue) {
        showToast('Please write your review.', 'error');
        reviewTextInput.focus();
        return;
      }

      /* Show loading state and disable button */
      submitReviewBtn.disabled = true;
      submitReviewBtn.innerHTML = '<span class="btn-spinner"></span> Submitting...';

      try {
        /* POST the new review to Supabase */
        await supabaseFetch(REST_BASE + '/reviews', {
          method: 'POST',
          headers: POST_RETURN_HEADERS,
          body: JSON.stringify({
            name: nameValue,
            rating: selectedStarRating,
            text: textValue
          })
        });

        /* Success — reset form and refresh list */
        showToast('Review submitted successfully! Thank you.', 'success');
        reviewNameInput.value = '';
        reviewTextInput.value = '';
        selectedStarRating = 0;
        updateStarVisual(0);

        /* Reload only the reviews from Supabase */
        await loadReviewsOnly();
      } catch (error) {
        showToast('Failed to submit review: ' + error.message, 'error');
      } finally {
        /* Always restore the button */
        submitReviewBtn.disabled = false;
        submitReviewBtn.innerHTML = 'Submit Review';
      }
    });

    /* ══════════════════════════════════════════════════════════════
       DATA LOADER — Reviews Only
       Used after submitting a new review to refresh just the list
       ══════════════════════════════════════════════════════════════ */
    async function loadReviewsOnly() {
      try {
        var data = await supabaseFetch(
          REST_BASE + '/reviews?select=*&order=created_at.desc'
        );
        renderReviews(data);
      } catch (error) {
        renderReviews(FALLBACK_REVIEWS);
      }
    }

    /* ══════════════════════════════════════════════════════════════
       MAIN DATA LOADER — Loads Everything on Page Load
       Fetches all 5 data sources in parallel using Promise.allSettled
       so partial failures don't break the entire page
       ══════════════════════════════════════════════════════════════ */
    async function loadAllData() {
      var isOnline = true;
      var firstErrorMessage = '';

      /* Show skeleton placeholders while loading */
      document.getElementById('servicesGrid').innerHTML = renderServiceSkeletons(4);
      document.getElementById('contactsGrid').innerHTML = renderContactSkeletons(3);
      document.getElementById('reviewsList').innerHTML = renderReviewSkeletons(3);

      /* Fetch all 5 data sources in parallel */
      var allResults = await Promise.allSettled([
        /* 0: Services */
        supabaseFetch(REST_BASE + '/services?select=*&order=sort_order.asc,id.asc'),
        /* 1: Contacts */
        supabaseFetch(REST_BASE + '/contacts?select=*&order=sort_order.asc,id.asc'),
        /* 2: Reviews */
        supabaseFetch(REST_BASE + '/reviews?select=*&order=created_at.desc'),
        /* 3: Settings */
        supabaseFetch(REST_BASE + '/settings?select=setting_key,setting_value'),
        /* 4: Page Content */
        supabaseFetch(REST_BASE + '/page_content?select=element_key,content')
      ]);

      var servicesData = null;
      var contactsData = null;
      var reviewsData = null;
      var settingsData = null;
      var pageContentData = null;

      /* Process services result */
      if (allResults[0].status === 'fulfilled') {
        servicesData = allResults[0].value;
      } else {
        isOnline = false;
        firstErrorMessage = firstErrorMessage || allResults[0].reason.message;
      }

      /* Process contacts result */
      if (allResults[1].status === 'fulfilled') {
        contactsData = allResults[1].value;
      } else {
        isOnline = false;
        firstErrorMessage = firstErrorMessage || allResults[1].reason.message;
      }

      /* Process reviews result */
      if (allResults[2].status === 'fulfilled') {
        reviewsData = allResults[2].value;
      } else {
        isOnline = false;
        firstErrorMessage = firstErrorMessage || allResults[2].reason.message;
      }

      /* Process settings result */
      if (allResults[3].status === 'fulfilled') {
        settingsData = allResults[3].value;
      } else {
        isOnline = false;
        firstErrorMessage = firstErrorMessage || allResults[3].reason.message;
      }

      /* Process page content result */
      if (allResults[4].status === 'fulfilled') {
        pageContentData = allResults[4].value;
      } else {
        isOnline = false;
        firstErrorMessage = firstErrorMessage || allResults[4].reason.message;
      }

      /* Update connection status indicator */
      if (isOnline) {
        updateConnectionStatus(true);
      } else {
        updateConnectionStatus(false, firstErrorMessage);
        showToast(
          'Database connection issue: ' + firstErrorMessage + '. Showing offline data.',
          'error'
        );
      }

      /* ── Render Services ── */
      renderServices(servicesData || FALLBACK_SERVICES);

      /* ── Render Contacts ── */
      renderContacts(contactsData || FALLBACK_CONTACTS);

      /* ── Render Reviews ── */
      renderReviews(reviewsData || FALLBACK_REVIEWS);

      /* ── Build Settings Map ── */
      var settingsMap = {};
      if (settingsData && Array.isArray(settingsData)) {
        for (var si = 0; si < settingsData.length; si++) {
          var row = settingsData[si];
          settingsMap[row.setting_key] = row.setting_value;
        }
      }

      /* ── Apply Hero Text (using !== undefined for empty string respect) ── */
      var heroTextValue;
      if (settingsMap.hero_text !== undefined) {
        heroTextValue = settingsMap.hero_text;
      } else {
        heroTextValue = FALLBACK_HERO_TEXT;
      }
      document.getElementById('heroParagraph').textContent = heroTextValue || FALLBACK_HERO_TEXT;

      /* ── Apply Profile Image (using !== undefined for empty string respect) ── */
      var profileImageValue;
      if (settingsMap.profile_image !== undefined) {
        profileImageValue = settingsMap.profile_image;
      } else {
        profileImageValue = FALLBACK_PROFILE_IMAGE;
      }
      setProfileImage(profileImageValue);

      /* ── Update Favicon with profile image ── */
      if (profileImageValue && profileImageValue.trim()) {
        updateFavicon(profileImageValue);
      }

      /* ── Apply Background Image (using !== undefined for empty string respect) ── */
      var bgImageValue;
      if (settingsMap.background_image !== undefined) {
        bgImageValue = settingsMap.background_image;
      } else {
        bgImageValue = '';
      }
      applyBackgroundImage(bgImageValue);

      /* ── Build Page Content Map and Apply ── */
      var pageContentMap = {};
      if (pageContentData && Array.isArray(pageContentData)) {
        for (var pi = 0; pi < pageContentData.length; pi++) {
          var pcRow = pageContentData[pi];
          pageContentMap[pcRow.element_key] = pcRow.content;
        }
      }
      applyPageContent(pageContentMap);
    }

    /* ══════════════════════════════════════════════════════════════
       SCROLL REVEAL — IntersectionObserver
       Elements with .scroll-reveal fade up when they enter viewport
       ══════════════════════════════════════════════════════════════ */
    var scrollRevealObserver = null;

    function observeScrollReveals() {
      if (!scrollRevealObserver) {
        scrollRevealObserver = new IntersectionObserver(
          function(entries) {
            for (var i = 0; i < entries.length; i++) {
              var entry = entries[i];
              if (entry.isIntersecting) {
                entry.target.classList.add('revealed');
                /* Stop observing once revealed — one-time animation */
                scrollRevealObserver.unobserve(entry.target);
              }
            }
          },
          {
            threshold: 0.08,
            rootMargin: '0px 0px -50px 0px'
          }
        );
      }

      /* Observe all elements that haven't been revealed yet */
      var elements = document.querySelectorAll('.scroll-reveal:not(.revealed)');
      for (var i = 0; i < elements.length; i++) {
        scrollRevealObserver.observe(elements[i]);
      }
    }

    /* ══════════════════════════════════════════════════════════════
       NAVIGATION — Smooth Scroll & Active Link Tracking
       ══════════════════════════════════════════════════════════════ */

    /* Smooth scroll for all anchor links */
    var allAnchorLinks = document.querySelectorAll('a[href^="#"]');
    for (var ai = 0; ai < allAnchorLinks.length; ai++) {
      (function(link) {
        link.addEventListener('click', function(e) {
          var href = link.getAttribute('href');
          if (!href || href === '#') return;

          var targetElement = document.querySelector(href);
          if (!targetElement) return;

          e.preventDefault();

          /* Calculate scroll position with header offset */
          var headerHeight = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--header-h'), 10) || 72;
          var targetTop = targetElement.getBoundingClientRect().top + window.pageYOffset - headerHeight - 12;

          window.scrollTo({
            top: targetTop,
            behavior: 'smooth'
          });

          /* Close mobile nav if open */
          closeMobileNav();
        });
      })(allAnchorLinks[ai]);
    }

    /* Track active nav link based on scroll position */
    var sectionElements = document.querySelectorAll('section[id]');
    var navLinkElements = document.querySelectorAll('.nav-link');

    function updateActiveNavLink() {
      var scrollPosition = window.pageYOffset || window.scrollY;
      var headerOffset = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--header-h'), 10) || 72;
      var triggerPoint = scrollPosition + headerOffset + 100;

      for (var i = 0; i < sectionElements.length; i++) {
        var section = sectionElements[i];
        var sectionTop = section.offsetTop;
        var sectionHeight = section.offsetHeight;
        var sectionId = section.getAttribute('id');

        if (triggerPoint >= sectionTop && triggerPoint < sectionTop + sectionHeight) {
          for (var j = 0; j < navLinkElements.length; j++) {
            var navLink = navLinkElements[j];
            var navHref = navLink.getAttribute('href');
            if (navHref === '#' + sectionId) {
              navLink.classList.add('active');
            } else {
              navLink.classList.remove('active');
            }
          }
          break;
        }
      }
    }

    /* Header shadow on scroll */
    function updateHeaderOnScroll() {
      var header = document.getElementById('siteHeader');
      if (window.pageYOffset > 20) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    }

    /* Combined scroll handler — throttled with requestAnimationFrame */
    var scrollTicking = false;
    window.addEventListener('scroll', function() {
      if (!scrollTicking) {
        requestAnimationFrame(function() {
          updateActiveNavLink();
          updateHeaderOnScroll();
          scrollTicking = false;
        });
        scrollTicking = true;
      }
    }, { passive: true });

    /* ══════════════════════════════════════════════════════════════
       MOBILE HAMBURGER MENU
       ══════════════════════════════════════════════════════════════ */
    var hamburgerBtn = document.getElementById('hamburgerBtn');
    var navLinksContainer = document.getElementById('navLinks');

    function openMobileNav() {
      hamburgerBtn.classList.add('open');
      hamburgerBtn.setAttribute('aria-expanded', 'true');
      navLinksContainer.classList.add('open');
    }

    function closeMobileNav() {
      hamburgerBtn.classList.remove('open');
      hamburgerBtn.setAttribute('aria-expanded', 'false');
      navLinksContainer.classList.remove('open');
    }

    function toggleMobileNav() {
      if (navLinksContainer.classList.contains('open')) {
        closeMobileNav();
      } else {
        openMobileNav();
      }
    }

    hamburgerBtn.addEventListener('click', toggleMobileNav);

    /* Close mobile nav when clicking a nav link */
    var mobileNavLinks = navLinksContainer.querySelectorAll('.nav-link');
    for (var mli = 0; mli < mobileNavLinks.length; mli++) {
      (function(navLink) {
        navLink.addEventListener('click', function() {
          closeMobileNav();
        });
      })(mobileNavLinks[mli]);
    }

    /* Close mobile nav when clicking outside */
    document.addEventListener('click', function(e) {
      if (navLinksContainer.classList.contains('open')) {
        var isInsideNav = navLinksContainer.contains(e.target);
        var isHamburger = hamburgerBtn.contains(e.target);
        if (!isInsideNav && !isHamburger) {
          closeMobileNav();
        }
      }
    });

    /* Close mobile nav on Escape key */
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && navLinksContainer.classList.contains('open')) {
        closeMobileNav();
        hamburgerBtn.focus();
      }
    });

    /* ══════════════════════════════════════════════════════════════
       INITIALIZATION
       Wait for DOM to be ready, then start loading all data
       ══════════════════════════════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', function() {
      /* Initialize scroll reveal observer for static elements */
      observeScrollReveals();

      /* Run initial active link check */
      updateActiveNavLink();
      updateHeaderOnScroll();

      /* Load all data from Supabase */
      loadAllData();
    });
  </script>
</body>
</html>
