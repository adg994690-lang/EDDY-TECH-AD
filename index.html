<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDDY TECH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #08080d;
      --bg-card: #0f0f17;
      --bg-card-hover: #141420;
      --bg-alt: #0b0b12;
      --fg: #e8e8f0;
      --fg-muted: #8888a0;
      --accent: #00e68a;
      --accent-dim: rgba(0,230,138,0.12);
      --accent-glow: rgba(0,230,138,0.25);
      --gold: #ffb800;
      --danger: #ff4466;
      --border: #1a1a2e;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow-card: 0 4px 30px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.3);
      --shadow-card-hover: 0 8px 50px rgba(0,0,0,0.6), 0 2px 10px rgba(0,230,138,0.1);
      --shadow-btn: 0 4px 20px rgba(0,230,138,0.25);
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'Space Grotesk', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #151522 25%, #1e1e30 50%, #151522 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .skel-line { height: 16px; margin-bottom: 10px; display: block; }
    .skel-line.short { width: 60%; }
    .skel-line.med { width: 80%; }
    .skel-circle { width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0; }
    .skel-title { height: 20px; width: 50%; margin-bottom: 12px; }
    .skel-stars { height: 20px; width: 120px; margin-bottom: 10px; }
    .skel-date { height: 14px; width: 100px; margin-top: 8px; }

    /* ── Header ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(8,8,13,0.8);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-container {
      display: flex; align-items: center; justify-content: space-between;
      height: 70px;
    }
    .logo { font-family: var(--font-heading); font-weight: 900; font-size: 1.4rem; letter-spacing: -0.5px; }
    .logo-green { color: var(--accent); }
    .logo-white { color: #fff; }

    nav { display: flex; gap: 32px; }
    .nav-link {
      font-size: 0.9rem; font-weight: 500; color: var(--fg-muted);
      transition: color 0.25s; position: relative;
    }
    .nav-link:hover, .nav-link.active { color: var(--fg); }
    .nav-link.active::after {
      content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
      height: 2px; background: var(--accent); border-radius: 2px;
    }

    .nav-right { display: flex; align-items: center; gap: 16px; }

    .profile-circle {
      width: 38px; height: 38px; border-radius: 50%; overflow: hidden;
      background: var(--accent-dim); border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-heading); font-weight: 800; font-size: 0.9rem; color: var(--accent);
      flex-shrink: 0;
    }
    .profile-circle img { width: 100%; height: 100%; object-fit: cover; }

    .hamburger {
      display: none; background: none; border: none; cursor: pointer;
      flex-direction: column; gap: 5px; padding: 4px;
    }
    .hamburger span {
      display: block; width: 24px; height: 2px; background: var(--fg);
      border-radius: 2px; transition: all 0.3s;
    }
    .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    @media (max-width: 768px) {
      .hamburger { display: flex; }
      nav {
        position: fixed; top: 70px; left: 0; right: 0;
        background: rgba(8,8,13,0.95); backdrop-filter: blur(20px);
        flex-direction: column; align-items: center; gap: 0;
        max-height: 0; overflow: hidden; transition: max-height 0.35s ease;
        border-bottom: 1px solid var(--border);
      }
      nav.open { max-height: 300px; }
      .nav-link { padding: 16px 0; font-size: 1rem; }
      .nav-link.active::after { display: none; }
    }

    /* ── Hero ── */
    .hero {
      position: relative; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; text-align: center; overflow: hidden;
      padding: 120px 24px 80px;
      background-size: cover; background-position: center; background-repeat: no-repeat;
    }
    .hero-grid {
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .hero-glow {
      position: absolute; width: 700px; height: 700px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,230,138,0.12) 0%, transparent 65%);
      animation: glowPulse 5s ease-in-out infinite; pointer-events: none;
    }
    @keyframes glowPulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.15); opacity: 1; }
    }
    .hero-content { position: relative; z-index: 1; max-width: 750px; }

    .tag-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent-dim); border: 1px solid rgba(0,230,138,0.2);
      padding: 8px 20px; border-radius: 100px; font-size: 0.82rem;
      font-weight: 500; color: var(--accent); margin-bottom: 28px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .pulse-dot {
      width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
      animation: pulseDot 2s ease-in-out infinite;
    }
    @keyframes pulseDot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,230,138,0.5); }
      50% { box-shadow: 0 0 0 8px rgba(0,230,138,0); }
    }

    .hero h1 {
      font-family: var(--font-heading); font-weight: 900; font-size: clamp(2.4rem, 6vw, 4rem);
      line-height: 1.1; margin-bottom: 24px; letter-spacing: -1px;
    }
    .accent { color: var(--accent); }
    .hero-text { font-size: 1.05rem; color: var(--fg-muted); max-width: 600px; margin: 0 auto 36px; line-height: 1.7; }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #08080d; font-family: var(--font-body);
      font-weight: 600; font-size: 0.95rem; padding: 14px 32px;
      border-radius: 100px; border: none; cursor: pointer;
      box-shadow: var(--shadow-btn); transition: all 0.3s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(0,230,138,0.35); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(8,8,13,0.3); border-top-color: #08080d;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Sections ── */
    .section { padding: 100px 0; }
    .section-alt { background: var(--bg-alt); }

    .section-header { text-align: center; margin-bottom: 56px; }
    .section-label {
      display: inline-block; font-size: 0.78rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 2px; color: var(--accent);
      margin-bottom: 12px;
    }
    .section-title {
      font-family: var(--font-heading); font-weight: 900;
      font-size: clamp(1.8rem, 4vw, 2.6rem); letter-spacing: -0.5px;
    }

    /* ── Service Cards ── */
    .services-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 24px;
    }
    .service-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px 28px;
      box-shadow: var(--shadow-card); transition: all 0.35s;
      position: relative; overflow: hidden;
    }
    .service-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 3px; background: var(--accent); transform: scaleX(0);
      transform-origin: left; transition: transform 0.35s ease;
    }
    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-card-hover);
      border-color: rgba(0,230,138,0.3);
    }
    .service-card:hover::before { transform: scaleX(1); }
    .service-card .card-icon {
      width: 52px; height: 52px; border-radius: 12px;
      background: var(--accent-dim); display: flex; align-items: center;
      justify-content: center; font-size: 1.3rem; color: var(--accent);
      margin-bottom: 20px;
    }
    .service-card h3 {
      font-family: var(--font-heading); font-weight: 800;
      font-size: 1.15rem; margin-bottom: 10px;
    }
    .service-card p { font-size: 0.88rem; color: var(--fg-muted); line-height: 1.6; }

    .skel-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px 28px;
      box-shadow: var(--shadow-card);
    }
    .skel-card .skel-inner { display: flex; flex-direction: column; gap: 0; }

    /* ── Contact Cards ── */
    .contacts-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }
    .contact-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow-card);
      display: flex; align-items: flex-start; gap: 18px;
      transition: all 0.3s;
    }
    .contact-card:hover {
      border-color: rgba(0,230,138,0.3); transform: translateY(-3px);
      box-shadow: var(--shadow-card-hover);
    }
    .contact-card .card-icon {
      width: 46px; height: 46px; border-radius: 10px;
      background: var(--accent-dim); display: flex; align-items: center;
      justify-content: center; font-size: 1.1rem; color: var(--accent);
      flex-shrink: 0;
    }
    .contact-card h4 {
      font-family: var(--font-heading); font-weight: 800;
      font-size: 0.95rem; margin-bottom: 4px;
    }
    .contact-card a {
      font-size: 0.88rem; color: var(--fg-muted);
      transition: color 0.2s; word-break: break-all;
    }
    .contact-card a:hover { color: var(--accent); }

    /* ── Reviews ── */
    .review-form-container {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px; margin-bottom: 48px;
      box-shadow: var(--shadow-card); max-width: 560px; margin-left: auto;
      margin-right: auto;
    }
    .star-rating { display: flex; gap: 6px; margin-bottom: 20px; }
    .star-rating i {
      font-size: 1.5rem; color: #2a2a3e; cursor: pointer;
      transition: color 0.15s, transform 0.15s;
    }
    .star-rating i:hover { transform: scale(1.15); }
    .star-rating i.active { color: var(--gold); }

    .form-input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 16px; color: var(--fg);
      font-family: var(--font-body); font-size: 0.9rem; transition: border-color 0.25s;
      outline: none; margin-bottom: 14px;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--fg-muted); }
    .form-textarea { min-height: 100px; resize: vertical; }

    .reviews-list { display: flex; flex-direction: column; gap: 20px; max-width: 560px; margin: 0 auto; }
    .review-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-card);
    }
    .review-card .review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .review-card .review-name { font-family: var(--font-heading); font-weight: 800; font-size: 1rem; }
    .review-card .review-date { font-size: 0.78rem; color: var(--fg-muted); }
    .review-card .review-stars { margin-bottom: 10px; }
    .review-card .review-stars i { font-size: 0.85rem; color: var(--gold); }
    .review-card .review-stars i.empty { color: #2a2a3e; }
    .review-card .review-text { font-size: 0.9rem; color: var(--fg-muted); line-height: 1.65; }

    .skel-review {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-card);
    }

    /* ── Footer ── */
    .footer {
      text-align: center; padding: 36px 24px;
      border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--fg-muted);
    }

    /* ── Toast ── */
    #toastContainer {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      display: flex; flex-direction: column-reverse; gap: 10px;
    }
    .toast {
      background: #1a1a2e; border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 14px 20px; min-width: 280px; max-width: 400px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5); font-size: 0.88rem;
      display: flex; align-items: flex-start; gap: 10px;
      animation: toastIn 0.35s ease forwards;
    }
    .toast.removing { animation: toastOut 0.3s ease forwards; }
    .toast.success { border-left: 3px solid var(--accent); }
    .toast.error { border-left: 3px solid var(--danger); }
    .toast-icon { font-size: 1rem; margin-top: 2px; }
    .toast.success .toast-icon { color: var(--accent); }
    .toast.error .toast-icon { color: var(--danger); }
    @keyframes toastIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(20px); } }

    /* ── Connection Status ── */
    #connectionStatus {
      position: fixed; bottom: 20px; left: 20px; z-index: 900;
      display: flex; align-items: center; gap: 8px;
      background: rgba(15,15,23,0.9); backdrop-filter: blur(10px);
      border: 1px solid var(--border); border-radius: 100px;
      padding: 8px 16px; font-size: 0.72rem; color: var(--fg-muted);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #555;
      flex-shrink: 0; transition: background 0.3s;
    }
    .status-dot.online { background: var(--accent); box-shadow: 0 0 6px rgba(0,230,138,0.5); }
    .status-dot.offline { background: var(--danger); box-shadow: 0 0 6px rgba(255,68,102,0.5); }

    /* ── Scroll Reveal ── */
    .reveal {
      opacity: 0; transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.revealed { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }

    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; transition: none; }
      .hero-glow { animation: none; }
      .pulse-dot { animation: none; }
      .skeleton { animation: none; }
    }

    @media (max-width: 480px) {
      .services-grid { grid-template-columns: 1fr; }
      .contacts-grid { grid-template-columns: 1fr; }
      .review-form-container { padding: 20px; }
    }
  </style>
</head>

      { name: 'Hanna Mekonnen', rating: 5, text: 'The video editing service was top-notch. They understood exactly what I needed and exceeded my expectations. The final product was beyond what I imagined. Will definitely come back!', review_date: new Date(Date.now() - 7*86400000).toISOString().split('T')[0] },
      { name: 'Dawit Assefa', rating: 4, text: 'Great work on our event coverage. The photos and videos were amazing quality. Communication was smooth throughout the process and delivery was on time.', review_date: new Date(Date.now() - 3*86400000).toISOString().split('T')[0] }
    ];

    var FALLBACK_HERO_TEXT = 'Founded by Eddy — the owner of AMBO MARKET, the premier local platform to buy and sell things. We bring your digital vision to life with professional precision.';
    var FALLBACK_PROFILE_IMAGE = 'https://z-cdn-media.chatglm.cn/files/2b930774-8985-4506-8d33-04f9ac025bb5.png?auth_key=1883920902-502ba23644bb44718856b5f5a981382f-0-0549443c9e150a2d0140a2dd0b98bf05';

    var FALLBACK_PAGE_CONTENT = {
      hero_tagline: 'Digital Solutions by Eddy',
      hero_title: 'Welcome to EDDY TECH',
      hero_title_highlight: 'EDDY TECH',
      hero_button_text: 'Explore Services',
      services_label: 'What We Do',
      services_title: 'Our Services',
      contacts_label: 'Reach Out',
      contacts_title: 'Get In Touch',
      reviews_label: 'Testimonials',
      reviews_title: 'Client Reviews',
      footer_text: '\u00A9 2025 EDDY TECH. All rights reserved.'
    };

    /* ══════════════════════════════════════
       Utility Functions
       ══════════════════════════════════════ */
    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      var d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function renderStars(rating) {
      var html = '';
      for (var i = 1; i <= 5; i++) {
        html += '<i class="fas fa-star' + (i <= rating ? '' : ' empty') + '"></i>';
      }
      return html;
    }

    /* ══════════════════════════════════════
       Fetch Helper
       ══════════════════════════════════════ */
    async function fetchJSON(url, options) {
      options = options || {};
      var response = await fetch(url, {
        ...options,
        headers: { ...HEADERS, ...options.headers }
      });
      if (!response.ok) {
        var errorMsg;
        try {
          var errData = await response.json();
          errorMsg = errData.message || errData.msg || JSON.stringify(errData);
        } catch (e) {
          errorMsg = response.statusText || ('HTTP ' + response.status);
        }
        throw new Error(errorMsg);
      }
      var text = await response.text();
      if (!text) return [];
      return JSON.parse(text);
    }

    /* ══════════════════════════════════════
       Toast Notifications
       ══════════════════════════════════════ */
    function showToast(message, type) {
      type = type || 'success';
      var container = document.getElementById('toastContainer');
      var toast = document.createElement('div');
      toast.className = 'toast ' + type;
      var iconClass = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
      toast.innerHTML = '<i class="fas ' + iconClass + ' toast-icon"></i><span>' + escapeHtml(message) + '</span>';
      container.appendChild(toast);
      setTimeout(function() {
        toast.classList.add('removing');
        setTimeout(function() { toast.remove(); }, 300);
      }, 4000);
    }

    /* ══════════════════════════════════════
       Connection Status
       ══════════════════════════════════════ */
    function setConnectionStatus(online, message) {
      var dot = document.getElementById('statusDot');
      var text = document.getElementById('statusText');
      dot.className = 'status-dot ' + (online ? 'online' : 'offline');
      text.textContent = online ? 'Connected to database' : ('Offline \u2014 ' + message);
    }

    /* ══════════════════════════════════════
       Skeleton Renderers
       ══════════════════════════════════════ */
    function renderServiceSkeletons(count) {
      var html = '';
      for (var i = 0; i < count; i++) {
        html += '<div class="skel-card"><div class="skel-inner">' +
          '<div class="skeleton skel-circle" style="margin-bottom:18px"></div>' +
          '<div class="skeleton skel-title"></div>' +
          '<div class="skeleton skel-line med"></div>' +
          '<div class="skeleton skel-line short"></div>' +
          '</div></div>';
      }
      return html;
    }

    function renderContactSkeletons(count) {
      var html = '';
      for (var i = 0; i < count; i++) {
        html += '<div class="skel-card" style="display:flex;align-items:flex-start;gap:18px;padding:28px">' +
          '<div class="skeleton skel-circle" style="width:46px;height:46px"></div>' +
          '<div style="flex:1">' +
          '<div class="skeleton skel-title" style="width:40%"></div>' +
          '<div class="skeleton skel-line med" style="margin-top:6px"></div>' +
          '</div></div>';
      }
      return html;
    }

    function renderReviewSkeletons(count) {
      var html = '';
      for (var i = 0; i < count; i++) {
        html += '<div class="skel-review">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">' +
          '<div class="skeleton" style="width:120px;height:18px"></div>' +
          '<div class="skeleton" style="width:90px;height:14px"></div>' +
          '</div>' +
          '<div class="skeleton skel-stars" style="margin-bottom:12px"></div>' +
          '<div class="skeleton skel-line med"></div>' +
          '<div class="skeleton skel-line short"></div>' +
          '</div>';
      }
      return html;
    }

    /* ══════════════════════════════════════
       Data Renderers
       ══════════════════════════════════════ */
    function renderServices(services) {
      var grid = document.getElementById('servicesGrid');
      if (!services.length) {
        grid.innerHTML = '<p style="color:var(--fg-muted);text-align:center;grid-column:1/-1">No services available yet.</p>';
        return;
      }
      grid.innerHTML = services.map(function(s, i) {
        return '<div class="service-card reveal reveal-delay-' + Math.min(i % 3 + 1, 3) + '">' +
          '<div class="card-icon"><i class="fas ' + escapeHtml(s.icon || 'fa-gear') + '"></i></div>' +
          '<h3>' + escapeHtml(s.title) + '</h3>' +
          '<p>' + escapeHtml(s.description) + '</p>' +
          '</div>';
      }).join('');
      observeReveals();
    }

    function renderContacts(contacts) {
      var grid = document.getElementById('contactsGrid');
      if (!contacts.length) {
        grid.innerHTML = '<p style="color:var(--fg-muted);text-align:center;grid-column:1/-1">No contact info available yet.</p>';
        return;
      }
      grid.innerHTML = contacts.map(function(c, i) {
        return '<div class="contact-card reveal reveal-delay-' + Math.min(i % 3 + 1, 3) + '">' +
          '<div class="card-icon"><i class="fas ' + escapeHtml(c.icon || 'fa-phone') + '"></i></div>' +
          '<div>' +
          '<h4>' + escapeHtml(c.title) + '</h4>' +
          (c.link ? '<a href="' + escapeHtml(c.link) + '" target="_blank" rel="noopener">' + escapeHtml(c.value) + '</a>' : '<span style="font-size:0.88rem;color:var(--fg-muted)">' + escapeHtml(c.value) + '</span>') +
          '</div></div>';
      }).join('');
      observeReveals();
    }

    function renderReviews(reviews) {
      var list = document.getElementById('reviewsList');
      if (!reviews.length) {
        list.innerHTML = '<p style="color:var(--fg-muted);text-align:center">No reviews yet. Be the first to leave one!</p>';
        return;
      }
      list.innerHTML = reviews.map(function(r) {
        return '<div class="review-card reveal">' +
          '<div class="review-header">' +
          '<span class="review-name">' + escapeHtml(r.name) + '</span>' +
          '<span class="review-date">' + formatDate(r.review_date || r.created_at) + '</span>' +
          '</div>' +
          '<div class="review-stars">' + renderStars(r.rating) + '</div>' +
          '<p class="review-text">' + escapeHtml(r.text) + '</p>' +
          '</div>';
      }).join('');
      observeReveals();
    }

    /* ══════════════════════════════════════
       Page Content Applier
       (FIX #1: uses !== undefined instead of ||)
       ══════════════════════════════════════ */
    function applyPageContent(pc) {
      /* Hero tagline */
      if (pc.hero_tagline !== undefined) {
        document.getElementById('heroTagline').textContent = pc.hero_tagline || FALLBACK_PAGE_CONTENT.hero_tagline;
      }
      /* Hero title with highlight */
      var title = (pc.hero_title !== undefined) ? pc.hero_title : FALLBACK_PAGE_CONTENT.hero_title;
      var highlight = (pc.hero_title_highlight !== undefined) ? pc.hero_title_highlight : FALLBACK_PAGE_CONTENT.hero_title_highlight;
      var titleEl = document.getElementById('heroTitle');
      if (highlight && title && title.indexOf(highlight) !== -1) {
        var escapedTitle = escapeHtml(title);
        var escapedHighlight = escapeHtml(highlight);
        titleEl.innerHTML = escapedTitle.replace(escapedHighlight, '<span class="accent">' + escapedHighlight + '</span>');
      } else {
        titleEl.textContent = title || FALLBACK_PAGE_CONTENT.hero_title;
      }
      /* Hero button text */
      if (pc.hero_button_text !== undefined) {
        document.getElementById('heroBtnText').textContent = pc.hero_button_text || FALLBACK_PAGE_CONTENT.hero_button_text;
      }
      /* Services section */
      if (pc.services_label !== undefined) {
        document.getElementById('servicesLabel').textContent = pc.services_label || FALLBACK_PAGE_CONTENT.services_label;
      }
      if (pc.services_title !== undefined) {
        document.getElementById('servicesTitle').textContent = pc.services_title || FALLBACK_PAGE_CONTENT.services_title;
      }
      /* Contacts section */
      if (pc.contacts_label !== undefined) {
        document.getElementById('contactsLabel').textContent = pc.contacts_label || FALLBACK_PAGE_CONTENT.contacts_label;
      }
      if (pc.contacts_title !== undefined) {
        document.getElementById('contactsTitle').textContent = pc.contacts_title || FALLBACK_PAGE_CONTENT.contacts_title;
      }
      /* Reviews section */
      if (pc.reviews_label !== undefined) {
        document.getElementById('reviewsLabel').textContent = pc.reviews_label || FALLBACK_PAGE_CONTENT.reviews_label;
      }
      if (pc.reviews_title !== undefined) {
        document.getElementById('reviewsTitle').textContent = pc.reviews_title || FALLBACK_PAGE_CONTENT.reviews_title;
      }
      /* Footer */
      if (pc.footer_text !== undefined) {
        document.getElementById('footerText').textContent = pc.footer_text || FALLBACK_PAGE_CONTENT.footer_text;
      }
    }

    /* ══════════════════════════════════════
       Profile Image Setter
       (FIX #4: proper event listener, no inline onerror)
       ══════════════════════════════════════ */
    function setProfileImage(url) {
      var circle = document.getElementById('profileCircle');
      if (url && url.trim()) {
        var img = document.createElement('img');
        img.alt = 'Profile';
        img.src = url;
        img.onerror = function() {
          circle.textContent = 'E';
        };
        circle.innerHTML = '';
        circle.appendChild(img);
      } else {
        circle.textContent = 'E';
      }
    }

    /* ══════════════════════════════════════
       Background Image Applier
       (FIX #3: now actually applies background image)
       ══════════════════════════════════════ */
    function applyBackgroundImage(bgUrl) {
      var heroEl = document.getElementById('home');
      if (bgUrl && bgUrl.trim()) {
        heroEl.style.backgroundImage = 'url(' + escapeHtml(bgUrl) + ')';
        heroEl.style.backgroundSize = 'cover';
        heroEl.style.backgroundPosition = 'center';
        heroEl.style.backgroundRepeat = 'no-repeat';
      } else {
        heroEl.style.backgroundImage = '';
      }
    }

    /* ══════════════════════════════════════
       Star Rating Interaction
       ══════════════════════════════════════ */
    var selectedRating = 0;
    var starRatingEl = document.getElementById('starRating');
    var starIcons = starRatingEl.querySelectorAll('i');

    function updateStarDisplay(rating) {
      starIcons.forEach(function(s) {
        s.classList.toggle('active', parseInt(s.dataset.value) <= rating);
      });
    }

    starIcons.forEach(function(star) {
      star.addEventListener('mouseenter', function() {
        updateStarDisplay(parseInt(star.dataset.value));
      });
      star.addEventListener('click', function() {
        selectedRating = parseInt(star.dataset.value);
        updateStarDisplay(selectedRating);
      });
    });
    starRatingEl.addEventListener('mouseleave', function() {
      updateStarDisplay(selectedRating);
    });

    /* ══════════════════════════════════════
       Submit Review
       ══════════════════════════════════════ */
    var submitBtn = document.getElementById('submitReview');

    submitBtn.addEventListener('click', async function() {
      var name = document.getElementById('reviewName').value.trim();
      var text = document.getElementById('reviewText').value.trim();

      if (!selectedRating) { showToast('Please select a star rating.', 'error'); return; }
      if (!name) { showToast('Please enter your name.', 'error'); return; }
      if (!text) { showToast('Please write a review.', 'error'); return; }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="btn-spinner"></span> Submitting...';

      try {
        await fetchJSON(REST_URL + '/reviews', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Prefer: 'return=representation' },
          body: JSON.stringify({ name: name, rating: selectedRating, text: text })
        });
        showToast('Review submitted successfully!', 'success');
        document.getElementById('reviewName').value = '';
        document.getElementById('reviewText').value = '';
        selectedRating = 0;
        updateStarDisplay(0);
        await loadReviewsOnly();
      } catch (err) {
        showToast('Failed to submit review: ' + err.message, 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Submit Review';
      }
    });

    /* ══════════════════════════════════════
       Data Loaders
       ══════════════════════════════════════ */
    async function loadReviewsOnly() {
      try {
        var data = await fetchJSON(REST_URL + '/reviews?select=*&order=created_at.desc');
        renderReviews(data);
      } catch (err) {
        renderReviews(FALLBACK_REVIEWS);
      }
    }

    /* ══════════════════════════════════════
       Load All Data
       ══════════════════════════════════════ */
    async function loadAllData() {
      var dbConnected = true;
      var firstError = '';

      /* Show skeletons */
      document.getElementById('servicesGrid').innerHTML = renderServiceSkeletons(4);
      document.getElementById('contactsGrid').innerHTML = renderContactSkeletons(3);
      document.getElementById('reviewsList').innerHTML = renderReviewSkeletons(3);

      var results = await Promise.allSettled([
        fetchJSON(REST_URL + '/services?select=*&order=sort_order.asc,id.asc'),
        fetchJSON(REST_URL + '/contacts?select=*&order=sort_order.asc,id.asc'),
        fetchJSON(REST_URL + '/reviews?select=*&order=created_at.desc'),
        fetchJSON(REST_URL + '/settings?select=setting_key,setting_value'),
        fetchJSON(REST_URL + '/page_content?select=element_key,content')
      ]);

      var servicesData = null;
      var contactsData = null;
      var reviewsData = null;
      var settingsData = null;
      var pageContentData = null;

      if (results[0].status === 'fulfilled') servicesData = results[0].value;
      else { dbConnected = false; firstError = firstError || results[0].reason.message; }

      if (results[1].status === 'fulfilled') contactsData = results[1].value;
      else { dbConnected = false; firstError = firstError || results[1].reason.message; }

      if (results[2].status === 'fulfilled') reviewsData = results[2].value;
      else { dbConnected = false; firstError = firstError || results[2].reason.message; }

      if (results[3].status === 'fulfilled') settingsData = results[3].value;
      else { dbConnected = false; firstError = firstError || results[3].reason.message; }

      if (results[4].status === 'fulfilled') pageContentData = results[4].value;
      else { dbConnected = false; firstError = firstError || results[4].reason.message; }

      /* Connection status */
      if (dbConnected) {
        setConnectionStatus(true);
      } else {
        setConnectionStatus(false, firstError);
        showToast('Database connection issue: ' + firstError + '. Showing offline data.', 'error');
      }

      /* Render services */
      renderServices(servicesData || FALLBACK_SERVICES);

      /* Render contacts */
      renderContacts(contactsData || FALLBACK_CONTACTS);

      /* Render reviews */
      renderReviews(reviewsData || FALLBACK_REVIEWS);

      /* Build settings map */
      var settingsMap = {};
      if (settingsData && Array.isArray(settingsData)) {
        settingsData.forEach(function(s) { settingsMap[s.setting_key] = s.setting_value; });
      }

      /* FIX #1: use !== undefined so empty string is respected */
      var heroText = (settingsMap.hero_text !== undefined) ? settingsMap.hero_text : FALLBACK_HERO_TEXT;
      document.getElementById('heroText').textContent = heroText || FALLBACK_HERO_TEXT;

      var profileImage = (settingsMap.profile_image !== undefined) ? settingsMap.profile_image : FALLBACK_PROFILE_IMAGE;
      setProfileImage(profileImage);

      /* FIX #3: apply background image */
      var bgImage = (settingsMap.background_image !== undefined) ? settingsMap.background_image : '';
      applyBackgroundImage(bgImage);

      /* Apply page content (layout editor text) */
      var pcMap = {};
      if (pageContentData && Array.isArray(pageContentData)) {
        pageContentData.forEach(function(row) { pcMap[row.element_key] = row.content; });
      }
      applyPageContent(pcMap);
    }

    /* ══════════════════════════════════════
       Scroll Reveal (IntersectionObserver)
       ══════════════════════════════════════ */
    var revealObserver = null;

    function observeReveals() {
      if (!revealObserver) {
        revealObserver = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('revealed');
              revealObserver.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
      }
      document.querySelectorAll('.reveal:not(.revealed)').forEach(function(el) {
        revealObserver.observe(el);
      });
    }

    /* ══════════════════════════════════════
       Navigation
       ══════════════════════════════════════ */
    document.querySelectorAll('a[href^="#"]').forEach(function(link) {
      link.addEventListener('click', function(e) {
        var href = this.getAttribute('href');
        if (href === '#') return;
        e.preventDefault();
        var target = document.querySelector(href);
        if (target) {
          var offset = 80;
          var top = target.getBoundingClientRect().top + window.scrollY - offset;
          window.scrollTo({ top: top, behavior: 'smooth' });
        }
        document.getElementById('navMenu').classList.remove('open');
        document.getElementById('hamburger').classList.remove('active');
      });
    });

    /* Active nav link on scroll */
    window.addEventListener('scroll', function() {
      var sections = document.querySelectorAll('section[id]');
      var scrollPos = window.scrollY + 120;
      sections.forEach(function(section) {
        var top = section.offsetTop;
        var height = section.offsetHeight;
        var id = section.getAttribute('id');
        var link = document.querySelector('.nav-link[href="#' + id + '"]');
        if (link) {
          link.classList.toggle('active', scrollPos >= top && scrollPos < top + height);
        }
      });
    });

    /* Hamburger menu */
    document.getElementById('hamburger').addEventListener('click', function() {
      this.classList.toggle('active');
      document.getElementById('navMenu').classList.toggle('open');
    });

    /* ══════════════════════════════════════
       Init
       ══════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', function() {
      observeReveals();
      loadAllData();
    });
  </script>
</body>
</html>
